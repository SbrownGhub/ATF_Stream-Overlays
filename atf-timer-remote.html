<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ATF Timer Remote</title>

  <!-- Oxanium font (matches the overlay) -->
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@600;700;800;900&display=swap" rel="stylesheet">

  <!-- Ably Realtime -->
  <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>

  <style>
    :root {
      /* ATF championship belt palette (from the shirt) */
      --gold: #d4af37;
      --gold-hot: #f0c94c;
      --gold-deep: #9a7b1e;
      --bg: #0c0c0c;
      --panel: #161616;
      --line: #2c2c2c;
      --text: #ffffff;
      --silver: #c8c8c8;
      --dim: #8a8a8a;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Oxanium', system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 100%;
    }

    /* ---- Header ---- */
    .brand {
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      color: var(--silver);
    }
    .brand span { color: var(--gold); }

    /* ---- Status pills ---- */
    .status { display: flex; gap: 8px; }
    .pill {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      color: var(--dim);
    }
    .pill .led {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--dim);
      flex: none;
    }
    .pill.up { color: var(--text); border-color: var(--gold-deep); }
    .pill.up .led { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
    .pill.down .led { background: #d20a0a; box-shadow: 0 0 8px #d20a0a; }

    /* ---- Clock: [R#]  [time] mirrors the overlay ---- */
    .clock {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 26px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .clock::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--gold-deep);
      transition: background 0.3s;
    }
    .clock.running::before { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

    .clockRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    #clockRound {
      font-family: Impact, 'Arial Black', 'Haettenschweiler', sans-serif;
      font-weight: bold;
      font-size: 56px;
      line-height: 1;
      color: var(--gold);
      -webkit-text-stroke: 1px #000;
      text-shadow: 2px 2px 0 #000;
      letter-spacing: 1px;
    }
    #clockTime {
      font-size: 64px;
      font-weight: 900;
      letter-spacing: 3px;
      line-height: 1;
      color: var(--gold);
      transition: color 0.3s;
      font-variant-numeric: tabular-nums;
    }
    .clock.running #clockTime { color: var(--text); }
    #clockLabel {
      margin-top: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ---- Round selector ---- */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin: 4px 0 -6px 4px;
    }
    .rounds {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .rounds button {
      font-family: Impact, 'Arial Black', 'Haettenschweiler', sans-serif;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--silver);
      font-size: 22px;
      padding: 14px 2px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .rounds button.active {
      background: var(--gold);
      border-color: var(--gold-hot);
      color: #000;
      box-shadow: 0 0 12px rgba(212,175,55,0.4);
    }
    .rounds button:active { background: var(--gold-hot); color: #000; }

    /* ---- Main buttons ---- */
    .mainBtns {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
    }
    .big {
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 22px 10px;
      cursor: pointer;
      transition: transform 0.05s, background 0.2s;
    }
    .big:active { transform: scale(0.97); }
    #toggleBtn {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 16px rgba(212,175,55,0.35);
    }
    #toggleBtn.running {
      background: #1f1f1f;
      color: var(--gold);
      border: 2px solid var(--gold-deep);
      box-shadow: none;
    }
    #resetBtn {
      background: var(--panel);
      color: var(--silver);
      border: 2px solid var(--line);
      font-size: 16px;
    }

    /* ---- Duration presets ---- */
    .presets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .presets button {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      padding: 16px 4px;
      cursor: pointer;
    }
    .presets button:active { background: var(--gold); border-color: var(--gold-hot); color: #000; }

    .hint {
      font-size: 12px;
      color: var(--dim);
      text-align: center;
      line-height: 1.5;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="brand">ATF <span>Timer Remote</span></div>

    <div class="status">
      <div class="pill down" id="pillConn"><span class="led"></span><span id="pillConnText">Connecting</span></div>
      <div class="pill down" id="pillOverlay"><span class="led"></span><span id="pillOverlayText">Overlay offline</span></div>
    </div>

    <div class="clock" id="clock">
      <div class="clockRow">
        <div id="clockRound">R1</div>
        <div id="clockTime">–:––</div>
      </div>
      <div id="clockLabel">Waiting for overlay</div>
    </div>

    <div class="section-label">Round</div>
    <div class="rounds" id="roundBtns">
      <button data-round="1" class="active" onclick="pickRound(1)">R1</button>
      <button data-round="2" onclick="pickRound(2)">R2</button>
      <button data-round="3" onclick="pickRound(3)">R3</button>
      <button data-round="4" onclick="pickRound(4)">R4</button>
      <button data-round="5" onclick="pickRound(5)">R5</button>
    </div>

    <div class="mainBtns">
      <button class="big" id="toggleBtn" onclick="sendToggle()">Start</button>
      <button class="big" id="resetBtn" onclick="send({action:'reset'})">Reset</button>
    </div>

    <div class="section-label">Set duration (resets timer, paused)</div>
    <div class="presets">
      <button onclick="setMinutes(1)">1 min</button>
      <button onclick="setMinutes(3)">3 min</button>
      <button onclick="setMinutes(5)">5 min</button>
    </div>

    <div class="hint">Clock mirrors the live stream overlay. If it shows –:––, the overlay browser source isn't open in OBS.</div>
  </div>

  <script>
    // ================================================================
    //  ATF CONFIG — edit these two lines, save, done.
    //  Must be IDENTICAL to the values in the overlay file.
    // ================================================================
    const ABLY_API_KEY = "tBw4fw.5pecYw:TmTtbrUw1GKiFkDXUSEXkV4dG1i5eBcKZRavv3mmICE";
    const ROOM = "atf";
    // ================================================================

    let channel = null;
    let lastState = null;

    const clockEl = document.getElementById('clock');
    const timeEl = document.getElementById('clockTime');
    const roundTextEl = document.getElementById('clockRound');
    const labelEl = document.getElementById('clockLabel');
    const toggleBtn = document.getElementById('toggleBtn');
    const roundBtns = document.querySelectorAll('#roundBtns button');
    const pillConn = document.getElementById('pillConn');
    const pillConnText = document.getElementById('pillConnText');
    const pillOverlay = document.getElementById('pillOverlay');
    const pillOverlayText = document.getElementById('pillOverlayText');

    function formatMSS(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    // ---------------- Commands ----------------
    function send(data) {
      if (!channel) return;
      channel.publish('cmd', data);
    }
    function sendToggle() {
      if (lastState) {
        send({ action: lastState.running ? 'pause' : 'start' });
      } else {
        send({ action: 'toggle' });
      }
    }
    function setMinutes(mins) {
      send({ action: 'set', seconds: Math.round(mins * 60) });
    }
    function pickRound(n) {
      highlightRound(n); // instant feedback; overlay state confirms
      send({ action: 'round', round: n });
    }

    // ---------------- UI sync ----------------
    function highlightRound(n) {
      roundBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.round) === n));
      roundTextEl.textContent = 'R' + n;
    }

    function applyState(s) {
      lastState = s;
      timeEl.textContent = formatMSS(s.remaining);
      if (typeof s.round === 'number') highlightRound(s.round);
      if (s.running) {
        clockEl.classList.add('running');
        labelEl.textContent = 'Running';
        toggleBtn.textContent = 'Pause';
        toggleBtn.classList.add('running');
      } else {
        clockEl.classList.remove('running');
        labelEl.textContent = s.remaining === 0 ? 'Time!' : 'Paused';
        toggleBtn.textContent = 'Start';
        toggleBtn.classList.remove('running');
      }
    }

    function setOverlayPresent(present) {
      pillOverlay.className = 'pill ' + (present ? 'up' : 'down');
      pillOverlayText.textContent = present ? 'Overlay live' : 'Overlay offline';
      if (!present) {
        timeEl.textContent = '–:––';
        labelEl.textContent = 'Waiting for overlay';
        toggleBtn.textContent = 'Start';
        toggleBtn.classList.remove('running');
        clockEl.classList.remove('running');
        lastState = null;
      } else {
        send({ action: 'sync' });
      }
    }

    // ---------------- Connect ----------------
    (function connect() {
      if (!ABLY_API_KEY || ABLY_API_KEY.indexOf('PASTE_') === 0) {
        pillConnText.textContent = 'No API key in code';
        return;
      }

      const ably = new Ably.Realtime({ key: ABLY_API_KEY, clientId: 'atf-remote-' + Math.random().toString(36).slice(2, 8) });

      ably.connection.on('connected', () => {
        pillConn.className = 'pill up';
        pillConnText.textContent = 'Connected';
        send({ action: 'sync' });
      });
      ably.connection.on(['disconnected','suspended'], () => {
        pillConn.className = 'pill down';
        pillConnText.textContent = 'Reconnecting';
      });
      ably.connection.on(['failed','closed'], () => {
        pillConn.className = 'pill down';
        pillConnText.textContent = 'Connection failed';
      });

      channel = ably.channels.get('atf-timer:' + ROOM);

      channel.subscribe('state', (msg) => applyState(msg.data));

      // Presence: is the overlay open anywhere?
      channel.presence.subscribe(['enter','present','update'], (m) => {
        if (m.data && m.data.role === 'overlay') setOverlayPresent(true);
      });
      channel.presence.subscribe('leave', (m) => {
        if (m.data && m.data.role === 'overlay') {
          channel.presence.get((err, members) => {
            const stillThere = !err && members && members.some(x => x.data && x.data.role === 'overlay');
            setOverlayPresent(stillThere);
          });
        }
      });
      channel.presence.get((err, members) => {
        const present = !err && members && members.some(x => x.data && x.data.role === 'overlay');
        setOverlayPresent(present);
      });
    })();
  </script>
</body>
</html>
